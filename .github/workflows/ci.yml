name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Lint (api/)
        run: npm run lint
      - name: Testes de regressão
        run: npm test
      - name: Portão de segurança (migrations)
        run: bash scripts/ci-seguranca-migrations.sh
