<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Cobrasq · Central de Peticionamento</title>
  <style>
    * { box-sizing: border-box; }
    body { max-width: 860px; margin: 0 auto; font: 14px/1.5 system-ui, Arial, sans-serif; color: #1a1a1a; padding: 0 16px 60px; background: #f6f7f9; }
    header { background: #0c2340; color: #fff; padding: 14px 18px; font-weight: 700; font-size: 16px; margin: 0 -16px 18px; }
    header small { font-weight: 400; opacity: .75; display: block; font-size: 12px; }
    .card { background: #fff; border: 1px solid #e3e3e3; border-radius: 10px; padding: 16px; margin-bottom: 14px; }
    .btn { padding: 9px 16px; border: 0; border-radius: 8px; background: #0c2340; color: #fff; cursor: pointer; font: inherit; }
    .btn.ghost { background: #fff; color: #0c2340; border: 1px solid #bbb; }
    .btn.warn { background: #c92a2a; }
    .btn:disabled { opacity: .5; cursor: default; }
    .muted { color: #666; font-size: 12.5px; }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11.5px; font-weight: 600; }
    .p-cinza { background: #eee; color: #444; } .p-azul { background: #d0ebff; color: #114488; }
    .p-verde { background: #d3f9d8; color: #1a7f37; } .p-amarelo { background: #fff3bf; color: #8a6d00; }
    .p-verm { background: #ffe3e3; color: #b02525; }
    .caso { border: 1px solid #e3e3e3; border-radius: 10px; padding: 12px; margin-bottom: 12px; background: #fff; }
    .caso h3 { margin: 0 0 6px; font-size: 14px; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .grade { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 8px; margin: 8px 0; }
    .grade label { font-size: 11px; color: #666; display: block; }
    .grade input { width: 100%; padding: 6px 8px; border: 1px solid #ccc; border-radius: 6px; font: inherit; font-size: 13px; }
    .partes input { padding: 5px 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 12.5px; }
    .docs li { font-size: 12.5px; margin: 2px 0; }
    .aviso { background: #fff3bf; border-radius: 8px; padding: 10px 12px; margin: 10px 0; }
    .erro { background: #ffe3e3; border-radius: 8px; padding: 10px 12px; margin: 10px 0; }
    .ok { background: #d3f9d8; border-radius: 8px; padding: 10px 12px; margin: 10px 0; }
    #passos { display: flex; gap: 6px; margin-bottom: 14px; font-size: 12.5px; }
    #passos span { padding: 5px 12px; border-radius: 99px; background: #e9ecef; color: #777; }
    #passos span.on { background: #0c2340; color: #fff; font-weight: 600; }
  </style>
</head>
<body>
  <header>⚖️ Central de Peticionamento <small>eproc (PR·RS·SC·…) e Projudi — iniciais e intercorrentes · o login no tribunal é sempre seu</small></header>
  <div id="passos">
    <span data-p="1">1 · Pasta</span><span data-p="2">2 · Extração (IA)</span><span data-p="3">3 · Revisão</span><span data-p="4">4 · Protocolo</span>
  </div>
  <div id="app"><div class="card muted">Carregando…</div></div>
  <script src="central.js"></script>
</body>
</html>
