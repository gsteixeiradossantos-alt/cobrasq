<html>
<head><title>Seleção de Tipo de Documento</title></head>
<body>
<h3>Pesquisa de Tipo de Documento</h3>
<label>Descrição: <input type="text" name="descricao" id="descricao"></label>
<input type="button" name="pesquisarButton" value="Pesquisar" class="button" onclick="montarArvore();">
<div id="arvore" style="height:250px;overflow:auto;border:1px solid #ccc;margin:8px 0;">Carregando…</div>
<div>Selecione o registro desejado e clique sobre "Selecionar" para voltar para a tela principal.</div>
<input type="button" name="selectButton" value="Selecionar" onclick="disableScreen(); selectTipoDocumento();" id="selectButton" class="button">
<input type="button" name="voltarButton" value="Voltar" onclick="Windows_closeSelf();" class="button">

<script>
// ajaxtags real: a árvore chega DEPOIS do load (simulado com 1500ms).
var TIPOS = [
  ['5801', 'EMBARGOS À EXECUÇÃO'], ['5802', 'EMBARGOS DE DECLARAÇÃO'],
  ['5803', 'EMENDA À PETIÇÃO INICIAL'], ['5804', 'IMPUGNAÇÃO À CONTESTAÇÃO'],
  ['5805', 'MANDADO DE SEGURANÇA'], ['58', 'MANIFESTAÇÃO DA PARTE'],
  ['5807', 'PROCURAÇÃO'], ['5808', 'RENÚNCIA DE MANDATO'],
  ['5809', 'REQUERIMENTO DE ARQUIVAMENTO'], ['5810', 'REQUERIMENTO DE DESISTÊNCIA']
];
function montarArvore() {
  var html = '<ul style="list-style:none;padding-left:8px;">';
  for (var i = 0; i < TIPOS.length; i++) {
    html += '<li><input type="radio" name="idNode" value="' + TIPOS[i][0] + '" id="rad' + i + '"> ' + TIPOS[i][1] + '</li>';
  }
  document.getElementById('arvore').innerHTML = html + '</ul>';
}
setTimeout(montarArvore, 1500);

function disableScreen() { /* overlay de "processando" do Projudi — no-op fiel */ }
// selectTipoDocumento real: lê o rádio MARCADO, grava nos campos da tela-mãe
// (nomes vêm da URL) e fecha a própria janela. Se nada marcado → alert.
function selectTipoDocumento() {
  var marcado = null;
  var radios = document.getElementsByName('idNode');
  for (var i = 0; i < radios.length; i++) if (radios[i].checked) marcado = radios[i];
  if (!marcado) { alert('Selecione um registro.'); return; }
  var q = new URLSearchParams(window.location.search);
  var pdoc = window.parent.document;
  var idField = pdoc.getElementById(q.get('parentIdField'));
  var descField = pdoc.getElementById(q.get('parentDescricaoField'));
  idField.value = marcado.value;
  descField.value = marcado.parentNode.textContent.replace(/^\s+|\s+$/g, '');
  Windows_closeSelf();
}
function Windows_closeSelf() {
  // a janela (div) vive no documento-mãe; o id é o do iframe sem o sufixo _content
  var meuId = window.name.replace(/_content$/, '');
  window.parent.Windows.close(meuId);
}
</script>
</body>
</html>
