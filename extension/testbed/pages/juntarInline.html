<html><head><title>Juntada (inline)</title></head><body>
<h2>Cumprimento de Intimação</h2>
<form name="juntarDocumentoForm" id="juntarDocumentoForm" action="#">
  <table class="resultTable"><tbody>
    <tr><td><input type="checkbox" name="intim"></td><td>Intimação</td></tr>
  </tbody></table>
  <label>Tipo de Documento:</label>
  <input type="text" id="descricaoTipoDocumento" name="descricaoTipoDocumento">
  <input type="hidden" id="idTipoDocumento" name="idTipoDocumento" value="58">
  <table class="resultTable"><tbody id="anexosBody"><tr><td colspan="3">Nenhum registro encontrado</td></tr></tbody></table>
  <input type="button" id="adicionarButton" value="Adicionar" onclick="revelarUpload();">
</form>
<!-- fileUploadForm EMBUTIDO (aparece na MESMA tela ao clicar Adicionar) -->
<div id="uploadArea" style="display:none;">
  <form name="fileUploadForm" id="fileUploadForm">
    <select id="codDescricao"><option value="0">Selecione</option><option value="10">Petição</option><option value="99">Outros</option></select>
    <input type="file" id="conteudo" accept="application/pdf">
    <input type="button" id="closeButton" value="Confirmar Inclusão" onclick="confirmarInline();">
  </form>
</div>
<script>
function revelarUpload(){ document.getElementById('uploadArea').style.display='block'; }
var _f=null;
document.addEventListener('change', function(e){
  if(e.target && e.target.id==='conteudo'){ var s=document.getElementById('codDescricao'); if(!s.value||s.value==='0'){return;} _f=e.target.files&&e.target.files[0]; e.target.value=''; }
});
function confirmarInline(){
  if(!_f) return;
  var tb=document.getElementById('anexosBody'); if(tb.querySelector('td[colspan]')) tb.innerHTML='';
  var tr=document.createElement('tr'); tr.innerHTML='<td>'+_f.name+'</td><td>Petição</td><td>'+Math.max(1,Math.round(_f.size/1024))+' Kb</td>';
  tb.appendChild(tr);
  document.getElementById('uploadArea').style.display='none';
}
</script>
</body></html>
