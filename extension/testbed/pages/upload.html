<html>
<head><title>Envio de Arquivos</title></head>
<body>
<form name="fileUploadForm" id="fileUploadForm" action="#" enctype="multipart/form-data">
  <label>Tipo:
    <select id="codDescricao" name="codDescricao">
      <option value="0">Selecione…</option>
      <option value="10">Petição</option>
      <option value="20">Documento de Identificação</option>
      <option value="99">Outros</option>
    </select>
  </label>
  <input type="text" id="descricao" name="descricao" placeholder="descrição (p/ Outros)">
  <input type="file" id="conteudo" name="conteudo" accept="application/pdf">
  <table class="resultTable"><tbody id="upBody"></tbody></table>
  <input type="button" id="closeButton" value="Confirmar Inclusão" class="button" onclick="confirmar();">
</form>
<script>
// Réplica do upload.do real: o onchange do input JÁ envia (auto), exigindo
// codDescricao != 0 antes (senão alert). Ao "enviar", adiciona uma linha na
// lista do diálogo. "Confirmar Inclusão" fecha e devolve a linha p/ a tela-mãe.
var enviados = [];
document.getElementById('conteudo').addEventListener('change', function () {
  var sel = document.getElementById('codDescricao');
  if (!sel.value || sel.value === '0') { alert('Selecione o tipo antes.'); return; }
  var f = this.files && this.files[0];
  if (!f) return;
  enviados.push(f.name);
  var tr = document.createElement('tr');
  tr.innerHTML = '<td>' + f.name + '</td><td>' + Math.max(1, Math.round(f.size / 1024)) + ' Kb</td>';
  document.getElementById('upBody').appendChild(tr);
  this.value = ''; // limpa (sinal de conclusão que a extensão espera)
});
function confirmar() {
  try {
    for (var i = 0; i < enviados.length; i++) window.parent.registrarAnexo(enviados[i]);
  } catch (e) {}
  // fecha o diálogo (remove o iframe da tela-mãe)
  try {
    var host = window.parent.document.getElementById('uploadHost');
    if (host) host.innerHTML = '';
  } catch (e) {}
}
</script>
</body>
</html>
