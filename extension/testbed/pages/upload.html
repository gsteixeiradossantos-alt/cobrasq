<html>
<head><title>Envio de Arquivos</title></head>
<body>
<form name="fileUploadForm" id="fileUploadForm" action="#" enctype="multipart/form-data">
  <input type="file" id="conteudo" name="conteudo" onchange="atualiza_arquivos_selecionados();" multiple accept="application/pdf">
  <table><tbody id="listaArquivos"></tbody></table>
  <input type="button" name="closeButton" value="Confirmar Inclusão" onclick="validar_e_fechar();" id="closeButton" class="button">
</form>
<script>
// Réplica FIEL do upload.do real: o select de tipo (name="tipos", id="tipoN") só é
// criado por atualiza_arquivos_selecionados(), DEPOIS de escolher o arquivo. E
// validar_e_fechar() exige um tipo != 0, senão alerta e NÃO fecha.
var OPCOES = [['0','-- CLIQUE AQUI PARA SELECIONAR --'],['1','Outros'],['40','Petição'],['30','Petição Inicial'],['32','Procuração'],['47','Contestação']];
function atualiza_arquivos_selecionados() {
  var input = document.getElementById('conteudo');
  var tb = document.getElementById('listaArquivos');
  tb.innerHTML = '';
  var files = input.files || [];
  for (var i = 0; i < files.length; i++) {
    var opts = OPCOES.map(function (o) { return '<option value="' + o[0] + '"' + (o[0] === '0' ? ' selected' : '') + '>' + o[1] + '</option>'; }).join('');
    var tr = document.createElement('tr');
    tr.innerHTML = '<td>' + files[i].name + '</td><td><select name="tipos" id="tipo' + i + '" style="width:95%;">' + opts + '</select></td>';
    tb.appendChild(tr);
  }
}
function validar_e_fechar() {
  var selects = document.querySelectorAll('select[name="tipos"]');
  if (!selects.length) { alert('Escolha um arquivo.'); return; }
  var nomes = [];
  for (var i = 0; i < selects.length; i++) {
    if (!selects[i].value || selects[i].value === '0') { alert('Selecione o tipo do documento.'); return; }
    var row = selects[i].closest('tr');
    nomes.push(row.cells[0].textContent);
  }
  try { for (var j = 0; j < nomes.length; j++) window.parent.registrarAnexo(nomes[j]); } catch (e) {}
  try { var host = window.parent.document.getElementById('uploadHost'); if (host) host.innerHTML = ''; } catch (e) {}
}
</script>
</body>
</html>
