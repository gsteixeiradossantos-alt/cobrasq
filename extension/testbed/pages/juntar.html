<html>
<head><title>Juntada de Documento</title></head>
<body>
<h2>Cumprimento de Intimação</h2>
<form name="juntarDocumentoForm" id="juntarDocumentoForm" action="#">
  <label>Tipo de Documento:</label>
  <input type="text" id="descricaoTipoDocumento" name="descricaoTipoDocumento" size="50">
  <input type="hidden" id="idTipoDocumento" name="idTipoDocumento" value="">
  <a href="javascript:openDialogSelecao('Seleção de Tipo de Documento');" class="searchButton" title="Seleção de Tipo de Documento" tabindex="-1"><span>Seleção de Tipo de Documento</span></a>
  <table class="resultTable"><tbody>
    <tr><td colspan="3">Nenhum registro encontrado</td></tr>
  </tbody></table>
</form>

<script>
// ── réplica fiel do mecanismo tjpr.js + window.js (Prototype Window) ──────────
// openDialogSelecao é o wrapper DA PÁGINA (como no Projudi real: o href chama só
// com o título; a página conhece contextPath/parentForm/etc).
var _winSeq = 0;
function openDialogSelecao(titulo) {
  openDialogSelecaoTipoDocumento(titulo, '/projudi', 'juntarDocumentoForm', 'idTipoDocumento', 'descricaoTipoDocumento', '9');
}
function openDialogSelecaoTipoDocumento(titulo, contextPath, parentForm, parentIdField, parentDescricaoField, tipoCompetencia) {
  var url = contextPath + '/processo/tipoDocumento.do?actionType=filtrarArvorePelaDescricao' +
    '&parentForm=' + parentForm + '&parentIdField=' + parentIdField + '&parentDescricaoField=' + parentDescricaoField;
  if (tipoCompetencia != '') url += '&tipoCompetencia=' + tipoCompetencia;
  openDialog(url, titulo, 0, 0);
}
// window.js real: cria overlay + div janela com iframe id="<id>_content" e o X
// <div class="tjpr_close" id="<id>_close" onclick='Windows.close("<id>", event)'>
var Windows = {
  _wins: {},
  close: function (id) {
    var w = document.getElementById(id);
    if (w) w.parentNode.removeChild(w);
    var ov = document.getElementById(id + '_overlay');
    if (ov) ov.parentNode.removeChild(ov);
    delete Windows._wins[id];
  }
};
function openDialog(url, titulo) {
  var id = 'window_' + (++_winSeq);
  var ov = document.createElement('div');
  ov.id = id + '_overlay';
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:900;';
  document.body.appendChild(ov);
  var w = document.createElement('div');
  w.id = id;
  w.className = 'tjpr';
  w.style.cssText = 'position:fixed;top:40px;left:60px;width:640px;height:420px;background:#fff;border:2px solid #888;z-index:1000;';
  w.innerHTML = '<div class="tjpr_titlebar" style="background:#3b5e2b;color:#fff;padding:4px 8px;">' + titulo +
    ' <div class="tjpr_close" id="' + id + '_close" onclick=\'Windows.close("' + id + '", event)\' style="float:right;cursor:pointer;">X Fechar</div></div>' +
    '<iframe frameborder="0" name="' + id + '_content" id="' + id + '_content" src="' + url + '" style="width:100%;height:380px;"></iframe>';
  document.body.appendChild(w);
  Windows._wins[id] = true;
}
</script>
</body>
</html>
