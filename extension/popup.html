<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <style>
    body { width: 320px; margin: 0; font: 13px/1.45 system-ui, Arial, sans-serif; color: #1a1a1a; }
    header { background: #0c2340; color: #fff; padding: 10px 12px; font-weight: 600; }
    #body { padding: 12px; }
    button { font: inherit; }
    .btn { width: 100%; padding: 8px; border: 0; border-radius: 6px; background: #0c2340; color: #fff; cursor: pointer; }
    .btn.ghost { background: #fff; color: #0c2340; border: 1px solid #ccc; }
    .job { border: 1px solid #e3e3e3; border-radius: 8px; padding: 8px 10px; margin-bottom: 8px; }
    .job b { font-family: ui-monospace, monospace; }
    .muted { color: #666; }
    .warn { background: #fff3bf; padding: 8px; border-radius: 6px; }
  </style>
</head>
<body>
  <header>Peticionador eproc TJPR</header>
  <div id="body"><div class="muted">Carregando…</div></div>
  <script src="popup.js"></script>
</body>
</html>
